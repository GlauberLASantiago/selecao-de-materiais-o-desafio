    document.getElementById('btn-pt').className = currentLang === 'pt' ? 'px-3 py-1 rounded-full font-bold text-sm bg-emerald-600 text-white transition-opacity' : 'px-3 py-1 rounded-full font-bold text-sm bg-transparent text-slate-300 transition-opacity hover:bg-slate-700';
    document.getElementById('btn-en').className = currentLang === 'en' ? 'px-3 py-1 rounded-full font-bold text-sm bg-emerald-600 text-white transition-opacity' : 'px-3 py-1 rounded-full font-bold text-sm bg-transparent text-slate-300 transition-opacity hover:bg-slate-700';
    updateInfoTexts();
    render();
}

function updateInfoTexts() {
    if(document.getElementById('text-info-title')) {
        document.getElementById('text-info-title').innerText = t('infoTitle');
        document.getElementById('text-rules-title').innerText = t('rulesTitle');
        document.getElementById('text-rules-desc').innerText = t('rulesDesc');
        document.getElementById('text-pedagogy-title').innerText = t('pedagogyTitle');
        document.getElementById('text-pedagogy-desc').innerText = t('pedagogyDesc');
    }
}

function startGame() {
    playSfx('click');
    score = 0;
    lives = 3;
    generateRound();
}

// --- CORE GAME LOGIC (MATERIAL SELECTION) ---
function generateRound() {
    // 1. Pick a target card that will be the correct answer
    const deck = [...MASTER_DECK];
    const targetCard = deck[Math.floor(Math.random() * deck.length)];
    
    // 2. Select two distinct attributes to form the requirement rule
    const attributes = ['lifetime', 'cost', 'impact', 'resistance', 'maxTemp'];
    const shuffledAttrs = attributes.sort(() => Math.random() - 0.5);
    const attr1 = shuffledAttrs[0];
    const attr2 = shuffledAttrs[1];
    
    const val1 = targetCard.stats[attr1];
    const val2 = targetCard.stats[attr2];
    
    // Create the rule evaluation function
    // Cost must be <= value. Everything else must be >= value.
    const evaluateRule = (card) => {
        const pass1 = attr1 === 'cost' ? card.stats[attr1] <= val1 : card.stats[attr1] >= val1;
        const pass2 = attr2 === 'cost' ? card.stats[attr2] <= val2 : card.stats[attr2] >= val2;
        return pass1 && pass2;
    };

    // 3. Find 2 other cards that DO NOT pass this rule
    const invalidCards = deck.filter(c => c.id !== targetCard.id && !evaluateRule(c));
    
    // If we somehow don't have enough invalid cards (rare but possible), regenerate the round
    if (invalidCards.length < 2) {
        return generateRound();
    }
    
    const shuffledInvalids = invalidCards.sort(() => Math.random() - 0.5);
    const options = [targetCard, shuffledInvalids[0], shuffledInvalids[1]].sort(() => Math.random() - 0.5);

    // Set state
    currentRound = {
        rules: [
            { attr: attr1, val: val1, isMax: attr1 === 'cost' },
            { attr: attr2, val: val2, isMax: attr2 === 'cost' }
        ],
        cards: options,
        correctCardId: targetCard.id
    };
    
    gameState = 'playing';
    lastSelectedCardId = null;
    render();
}

function selectCard(cardId) {
    if (gameState !== 'playing') return;
    
    lastSelectedCardId = cardId;
    
    if (cardId === currentRound.correctCardId) {
        // Correct!
        score++;
        playSfx('win');
        gameState = 'result';
        render();
        setTimeout(generateRound, 2500);
    } else {
        // Wrong!
        lives--;
        playSfx('lose');
        gameState = 'result';
        render();
        
        setTimeout(() => {
            if (lives <= 0) {
                gameState = 'gameover';
                render();
            } else {
                generateRound();
            }
        }, 3000);
    }
}

// --- RENDERING ---
function formatRule(rule) {
    const unit = rule.attr === 'maxTemp' ? '°C' : '';
    return `${t('reqText', rule.attr)} <strong class="text-white bg-slate-800 px-2 py-1 rounded ml-1 border border-slate-600">${rule.val}${unit}</strong>`;
}

                </div>
                <button onclick="startGame()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-lg py-3 px-8 rounded-full transition-all hover:scale-105">

        app.innerHTML = `
            <!-- HUD -->
            <div class="flex justify-between items-center mb-6 px-6 py-4 glass-panel rounded-2xl">
                <div class="flex items-center gap-4">
                    <div class="bg-slate-900 px-4 py-2 rounded-lg border border-slate-700">
                        <span class="text-xs text-slate-400 uppercase tracking-widest block font-bold">${t('score')}</span>
                        <span class="text-2xl font-black text-emerald-400">${score}</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400 uppercase tracking-widest font-bold mr-2 hidden md:block">${t('lives')}</span>
                    ${[1,2,3].map(i => `<i data-lucide="heart" class="w-8 h-8 ${i <= lives ? 'text-red-500 fill-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'text-slate-700'}"></i>`).join('')}
                </div>

            <div class="glass-panel rounded-2xl p-6 mb-8 relative overflow-hidden ${isResult ? (isCorrect ? 'border-2 border-emerald-500 bg-emerald-900/20' : 'border-2 border-red-500 bg-red-900/20') : 'border border-slate-700'}">
                ${isResult ? `

                </h3>
                <p class="text-slate-400 text-sm mb-3 uppercase tracking-wider font-semibold">${t('requirements')}</p>

                </p>
                <div class="flex flex-wrap justify-center gap-6 w-full">

function getCardHTML(card, isResult, isSelected) {
    let borderClass = 'border-slate-600';
    let opacityClass = '';
    
    if (isResult) {
        if (card.id === currentRound.correctCardId) {
            borderClass = 'border-emerald-400 shadow-[0_0_20px_rgba(52,211,153,0.6)] scale-105 z-10';
        } else if (isSelected) {
            borderClass = 'border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.6)] bg-red-900/50';
        } else {
            opacityClass = 'opacity-50 grayscale scale-95';
        }
    } else {
        borderClass = 'border-[#8DC63F] card-hover';
    }

    // Identify which stats are part of the rule to highlight them
    const isRuleStat = (key) => currentRound.rules.some(r => r.attr === key);

    return `
        <div onclick="!${isResult} && selectCard(${card.id})" class="w-full sm:w-64 max-w-[18rem] bg-slate-800 rounded-xl border-4 ${borderClass} ${opacityClass} flex flex-col overflow-hidden transition-all duration-300 relative select-none group">
            
            <!-- Header -->
            <div class="h-32 relative flex items-center justify-center p-2 border-b-2 border-slate-900">
                <div class="absolute inset-0 ${card.color} opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <div class="relative z-10 text-center w-full px-2">
                    <i data-lucide="${card.icon}" class="w-10 h-10 mx-auto text-white mb-2 drop-shadow-lg"></i>
                    <h2 class="font-bold text-white text-[1rem] leading-tight drop-shadow-lg">${card.title[currentLang]}</h2>
                </div>
            </div>

            <!-- Stats Table -->
            <div class="bg-slate-900 flex-1 flex flex-col text-sm">
                ${Object.keys(card.stats).map(key => {
                    const highlight = isRuleStat(key) ? 'text-yellow-400 font-bold bg-slate-800' : 'text-slate-300';
                    const suffix = key === 'maxTemp' ? ' °C' : '';
                    return `
                        <div class="stat-row flex justify-between items-center px-4 py-2 ${highlight}">
                            <span>${t('stats', key)}</span>
                            <span class="font-mono">${card.stats[key]}${suffix}</span>
                        </div>
                    `;
                }).join('')}
            </div>
            
            <!-- Type badge -->
            <div class="bg-slate-950 p-2 text-center border-t border-slate-800">
                <span class="text-[0.65rem] text-slate-400 font-bold tracking-widest uppercase">${card.type[currentLang]}</span>
            </div>
        </div>
    `;
}

// --- AUDIO SYSTEM (Web Audio API) ---
let audioCtx;
let musicNodes = [];
let musicPlaying = false;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleMusic() {
    initAudio();
    if (musicPlaying) {
        musicPlaying = false;
        musicNodes.forEach(node => { try { node.stop(); } catch(e){} node.disconnect(); });
        musicNodes = [];
        document.getElementById('icon-music').setAttribute('data-lucide', 'volume-x');
        document.getElementById('btn-music').classList.replace('text-[#8DC63F]', 'text-slate-400');
    } else {
        musicPlaying = true;
        // Sci-Fi tension ambient synth
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'sawtooth';
        osc.frequency.value = 60; 
        
        filter.type = 'lowpass';
        filter.frequency.value = 300;
        
        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.1; 
        
        const lfoFilterGain = audioCtx.createGain();
        lfoFilterGain.gain.value = 200;

        lfo.connect(lfoFilterGain);
        lfoFilterGain.connect(filter.frequency);

        gain.gain.value = 0.04; 

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(); lfo.start();
        musicNodes.push(osc, lfo, gain, filter, lfoFilterGain);

        document.getElementById('icon-music').setAttribute('data-lucide', 'volume-2');
        document.getElementById('btn-music').classList.replace('text-slate-400', 'text-[#8DC63F]');
    }
    lucide.createIcons();
}

function playSfx(type) {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    
    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'win') {
        // High ascending blip for success
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.setValueAtTime(900, now + 0.1);
        osc.frequency.setValueAtTime(1200, now + 0.2);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.linearRampToValueAtTime(0.05, now + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
    } else if (type === 'lose') {
        // Low descending buzz for failure
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.6);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
    }
}

// --- MODAL & PARTICLES ---
function toggleInfo() {
    const modal = document.getElementById('info-modal');
    const content = document.getElementById('info-modal-content');
    if (modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
        setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        playSfx('click');
    } else {
        modal.classList.add('opacity-0'); content.classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
        playSfx('click');
    }
}

let particlesArray = [];
let canvas, ctx;
function initParticles() {
    canvas = document.getElementById('particles'); ctx = canvas.getContext('2d');
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);
    particlesArray = [];
    for (let i = 0; i < Math.min(window.innerWidth / 15, 100); i++) particlesArray.push(new Particle());
}
function resizeCanvas() { if(canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } }
class Particle {
    constructor() {
        this.x = Math.random() * window.innerWidth; this.y = Math.random() * window.innerHeight;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 0.5 - 0.25; this.speedY = Math.random() * 0.5 - 0.25;
        this.color = ['rgba(16, 185, 129, 0.3)', 'rgba(141, 198, 63, 0.3)'][Math.floor(Math.random() * 2)];
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
        }
    }
    draw() {
        ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
}
function animateParticles() {
    if(!ctx || !canvas) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); }
    connectParticles(); requestAnimationFrame(animateParticles);
}
function connectParticles() {
    for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
            let distance = (particlesArray[a].x - particlesArray[b].x) ** 2 + (particlesArray[a].y - particlesArray[b].y) ** 2;
            if (distance < 15000) {
                ctx.strokeStyle = `rgba(16, 185, 129, ${(1 - distance/15000) * 0.2})`;
                ctx.lineWidth = 1; ctx.beginPath();
                ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
            }
        }
    }
}

// Start
init();
</script>
